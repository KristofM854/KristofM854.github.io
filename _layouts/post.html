---
layout: default
---
<article>
  <header class="post-header">
    <h1 class="post-header__title">{{ page.title }}</h1>
    <p class="post-header__meta">
      {{ page.date | date: "%d %B %Y" }}
      · {{ content | number_of_words | divided_by: 200 | plus: 1 }} min read
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
