# Site settings
title: Kristof Moeller
description: "Marine scientist specializing in harmful algal blooms and biotoxins. Associate Research Scientist at IAEA Marine Environment Laboratories, Monaco."
url: "https://kristofmoeller.com"
baseurl: ""

# Author
author:
  name: Kristof Moeller
  email: "kristof-moeller@outlook.de"
  description: "Associate Research Scientist | IAEA Marine Environment Laboratories"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

# Pagination (uses jekyll-paginate, GitHub Pages whitelisted)
paginate: 6
paginate_path: "/blog/page:num/"

# Collections (for projects/portfolio)
collections:
  projects:
    output: true
    permalink: /projects/:title/

# Plugins (GitHub Pages whitelisted only)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Exclude from Jekyll processing
exclude:
  - quiz
  - quiz-src
  - node_modules
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - CLAUDE_CODE_JEKYLL_MIGRATION_GUIDE.md
  - CLAUDE_CODE_INIT_PROMPT.md
  - HAB_QUIZ_IMPROVEMENT_IMPLEMENTATION_GUIDE.md
  - HAB_QUIZ_LITERATURE_BACKED_REFINEMENT_PASS.md
  - HAB_QUIZ_NEXT_STEP_IMPLEMENTATION_GUIDE_FOUNDATION.md
  - blog_articles_draft.md
  - haedat_filtered_export.csv

# Include dotfiles or specific files if needed
include:
  - _pages

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
